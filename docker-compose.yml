version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: subnet_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - rabbitmq
  celery:
    build: .
    command: celery -A ping_project worker -l INFO
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - rabbitmq
volumes:
  postgres_data: